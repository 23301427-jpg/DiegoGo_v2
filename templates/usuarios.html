{% extends "base.html" %}

{% block title %}Gestión de Usuarios - DiegoGo{% endblock %}

{% block content %}
<div class="container">
    <div class="dashboard-header">
        <h1 class="page-title">Gestión de Usuarios</h1>
        <p class="page-subtitle">Administra los usuarios registrados</p>
    </div>

    <div class="dash-section">
        <div class="usuarios-toolbar">
            <div class="search-wrapper">
                <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" placeholder="Buscar por nombre..."
                       class="search-input" autocomplete="off">
                <button class="search-clear" id="searchClear" style="display:none;">✕</button>
            </div>
            <button class="btn btn-primary btn-small" id="btnNuevoUsuario">+ Nuevo usuario</button>
        </div>

        <p class="search-info" id="searchInfo" style="display:none;"></p>
        <div id="toast" class="usuarios-toast" style="display:none;"></div>

        <div class="crud-table-wrapper">
            <table class="crud-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
            <div id="emptyState" class="crud-empty" style="display:none;">
                <p id="emptyMsg">No hay usuarios registrados aún.</p>
            </div>
        </div>

        <div class="pagination" id="paginacion" style="display:none;">
            <span class="pagination-info" id="paginaInfo"></span>
            <div class="pagination-btns" id="paginaBtns"></div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Nuevo Usuario</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-form">
            <input type="hidden" id="modalIdx" value="">
            <div class="form-group">
                <label class="form-label">Nombre <span class="required">*</span></label>
                <input type="text" id="modalNombre" class="form-input" placeholder="nombre">
            </div>
            <div class="form-group">
                <label class="form-label">Correo <span class="required">*</span></label>
                <input type="email" id="modalCorreo" class="form-input" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label class="form-label">Contraseña <span class="required">*</span></label>
                <input type="password" id="modalPass" class="form-input" placeholder="••••••••">
                <small class="form-hint" id="modalPassHint"></small>
            </div>
            <div id="modalError" class="modal-error" style="display:none;"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary btn-small" id="modalCancelBtn">Cancelar</button>
                <button type="button" class="btn btn-primary btn-small" id="modalSubmitBtn">Guardar</button>
            </div>
        </div>
    </div>
</div>

{% block extra_js %}
<script>
// ==========================================
// Datos en memoria — se cargan UNA sola vez
// ==========================================
const POR_PAGINA = 4;
let todos    = [];   // todos los usuarios
let filtrado = [];   // después de buscar
let pagina   = 1;

// Carga inicial
fetch('/api/usuarios/todos')
    .then(r => r.json())
    .then(data => {
        todos    = data;
        filtrado = data;
        renderTabla();
    });

// ==========================================
// Búsqueda local (instantánea, sin servidor)
// ==========================================
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');

searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    searchClear.style.display = q ? 'block' : 'none';
    filtrado = q ? todos.filter(u => u.nombre.toLowerCase().includes(q)) : todos;
    pagina = 1;
    renderTabla();
});

searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchClear.style.display = 'none';
    filtrado = todos;
    pagina = 1;
    renderTabla();
});

// ==========================================
// Render tabla (solo DOM, sin red)
// ==========================================
function renderTabla() {
    const tbody  = document.getElementById('tablaBody');
    const empty  = document.getElementById('emptyState');
    const info   = document.getElementById('searchInfo');
    const q      = searchInput.value.trim();

    // Info búsqueda
    if (q) {
        info.style.display = 'block';
        info.innerHTML = `${filtrado.length} resultado(s) para "<strong>${escHtml(q)}</strong>"`;
    } else {
        info.style.display = 'none';
    }

    if (!filtrado.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        document.getElementById('emptyMsg').textContent = q
            ? 'No se encontraron usuarios con ese nombre.'
            : 'No hay usuarios registrados aún.';
        document.getElementById('paginacion').style.display = 'none';
        return;
    }

    empty.style.display = 'none';

    // Slice de la página actual
    const inicio = (pagina - 1) * POR_PAGINA;
    const pagina_items = filtrado.slice(inicio, inicio + POR_PAGINA);

    tbody.innerHTML = pagina_items.map(u => `
        <tr>
            <td>${escHtml(u.nombre)}</td>
            <td>${escHtml(u.correo)}</td>
            <td class="td-actions">
                <button class="btn-crud btn-edit"
                        onclick="abrirEditar(${u.id},'${escAttr(u.nombre)}','${escAttr(u.correo)}')">
                    Editar
                </button>
                <button class="btn-crud btn-del"
                        onclick="confirmarEliminar(${u.id},'${escAttr(u.nombre)}')">
                    Eliminar
                </button>
            </td>
        </tr>
    `).join('');

    renderPaginacion();
}

function renderPaginacion() {
    const total  = filtrado.length;
    const pages  = Math.ceil(total / POR_PAGINA);
    const pag    = document.getElementById('paginacion');

    if (pages <= 1) { pag.style.display = 'none'; return; }

    pag.style.display = 'flex';
    document.getElementById('paginaInfo').textContent =
        `Página ${pagina} de ${pages} · ${total} usuarios`;

    let html = '';
    html += pagina > 1
        ? `<button class="page-btn" onclick="irPagina(${pagina-1})">← Anterior</button>`
        : `<span class="page-btn disabled">← Anterior</span>`;

    for (let i = 1; i <= pages; i++) {
        html += i === pagina
            ? `<span class="page-btn active">${i}</span>`
            : `<button class="page-btn" onclick="irPagina(${i})">${i}</button>`;
    }

    html += pagina < pages
        ? `<button class="page-btn" onclick="irPagina(${pagina+1})">Siguiente →</button>`
        : `<span class="page-btn disabled">Siguiente →</span>`;

    document.getElementById('paginaBtns').innerHTML = html;
}

function irPagina(n) { pagina = n; renderTabla(); }

// ==========================================
// Modal
// ==========================================
function cerrarModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.getElementById('modalError').style.display = 'none';
}

function abrirNuevo() {
    document.getElementById('modalTitle').textContent = 'Nuevo Usuario';
    document.getElementById('modalIdx').value = '';
    document.getElementById('modalNombre').value = '';
    document.getElementById('modalCorreo').value = '';
    document.getElementById('modalPass').value = '';
    document.getElementById('modalPassHint').textContent = 'Mínimo 8 caracteres, mayúsculas, minúsculas y números';
    document.getElementById('modalError').style.display = 'none';
    document.getElementById('modalOverlay').style.display = 'flex';
}

function abrirEditar(id, nombre, correo) {
    document.getElementById('modalTitle').textContent = 'Editar Usuario';
    document.getElementById('modalIdx').value = id;
    document.getElementById('modalNombre').value = nombre;
    document.getElementById('modalCorreo').value = correo;
    document.getElementById('modalPass').value = '';
    document.getElementById('modalPassHint').textContent = 'Deja en blanco para no cambiar la contraseña';
    document.getElementById('modalError').style.display = 'none';
    document.getElementById('modalOverlay').style.display = 'flex';
}

// ==========================================
// Guardar (solo 1 llamada al servidor, luego actualiza memoria)
// ==========================================
document.getElementById('modalSubmitBtn').addEventListener('click', function() {
    const idx      = document.getElementById('modalIdx').value;
    const nombre   = document.getElementById('modalNombre').value.trim();
    const correo   = document.getElementById('modalCorreo').value.trim();
    const password = document.getElementById('modalPass').value.trim();
    const errorEl  = document.getElementById('modalError');

    const url  = idx ? '/usuarios/editar' : '/usuarios/crear';
    const body = new FormData();
    if (idx) body.append('idx', idx);
    body.append('nombre', nombre);
    body.append('correo', correo);
    body.append('password', password);

    fetch(url, { method: 'POST', body })
        .then(r => r.json())
        .then(data => {
            if (!data.ok) {
                errorEl.textContent = data.msg;
                errorEl.style.display = 'block';
                return;
            }
            cerrarModal();
            mostrarToast(data.msg, true);

            // Actualiza memoria local sin volver a pedir al servidor
            if (idx) {
                const i = todos.findIndex(u => u.id === parseInt(idx));
                if (i !== -1) { todos[i].nombre = nombre; todos[i].correo = correo; }
            } else {
                // Para nuevo usuario necesitamos el ID — recargamos solo este caso
                fetch('/api/usuarios/todos')
                    .then(r => r.json())
                    .then(data => {
                        todos    = data;
                        filtrado = searchInput.value.trim()
                            ? data.filter(u => u.nombre.toLowerCase().includes(searchInput.value.trim().toLowerCase()))
                            : data;
                        renderTabla();
                    });
                return;
            }

            // Re-aplicar filtro en memoria
            const q = searchInput.value.trim().toLowerCase();
            filtrado = q ? todos.filter(u => u.nombre.toLowerCase().includes(q)) : todos;
            renderTabla();
        })
        .catch(() => {
            errorEl.textContent = 'Error de conexión';
            errorEl.style.display = 'block';
        });
});

// ==========================================
// Eliminar (actualiza memoria local)
// ==========================================
function confirmarEliminar(id, nombre) {
    if (!confirm(`¿Eliminar a ${nombre}?`)) return;

    fetch(`/usuarios/eliminar/${id}`, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            mostrarToast(data.msg, data.ok);
            if (!data.ok) return;

            // Quitar de memoria local — sin llamada extra al servidor
            todos    = todos.filter(u => u.id !== id);
            const q  = searchInput.value.trim().toLowerCase();
            filtrado = q ? todos.filter(u => u.nombre.toLowerCase().includes(q)) : todos;

            // Si la página queda vacía, retroceder una
            const pages = Math.ceil(filtrado.length / POR_PAGINA);
            if (pagina > pages && pages > 0) pagina = pages;

            renderTabla();
        });
}

// ==========================================
// Toast
// ==========================================
function mostrarToast(msg, ok) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'usuarios-toast ' + (ok ? 'toast-ok' : 'toast-err');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

// ==========================================
// Helpers
// ==========================================
function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/'/g,"\\'"); }

// Eventos
document.getElementById('btnNuevoUsuario').addEventListener('click', abrirNuevo);
document.getElementById('modalClose').addEventListener('click', cerrarModal);
document.getElementById('modalCancelBtn').addEventListener('click', cerrarModal);
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) cerrarModal(); });
</script>
{% endblock %}
{% endblock %}
