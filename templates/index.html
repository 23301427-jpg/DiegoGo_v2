{% extends "base.html" %}

{% block title %}Inicio - DiegoGo{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="container">
        <div class="hero-content">
            <h1 class="hero-title">
                <span class="title-line">Bienvenido a</span>
                <span class="title-highlight">DiegoGo</span>
            </h1>

            {% if session.usuario %}
                <div class="hero-actions">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-large">
                        <span>Ir al Dashboard</span>
                        <span class="btn-icon">→</span>
                    </a>
                </div>
                <div class="welcome-message">
                    <span class="welcome-icon">👋</span>
                    <span>Hola, <strong>{{ session.usuario }}</strong></span>
                </div>
            {% else %}
                <div class="hero-actions">
                    <a href="{{ url_for('registro') }}" class="btn btn-primary btn-large">
                        <span>Comenzar ahora</span>
                        <span class="btn-icon">→</span>
                    </a>
                    <a href="{{ url_for('login') }}" class="btn btn-secondary btn-large">
                        <span>Iniciar sesión</span>
                    </a>
                </div>
            {% endif %}
        </div>
    </div>
</div>

<div class="demo-section">
    <div class="container">
        <div class="demo-card">
            <a href="{{ url_for('simular_error') }}" class="btn btn-warning">
                <span>Simular un error</span>
                <span class="btn-icon">⚠</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
